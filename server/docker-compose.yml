version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movexa-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      # - PORT=5000
      # - MONGO_URI=mongodb+srv://... 
      # - JWT_SECRET=...
      # etc. Provide these via a standard .env file next to this compose file in production
    # env_file:
    #   - .env
    restart: always
